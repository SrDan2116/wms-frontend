<div class="container mt-5" style="max-width: 900px">

  <div class="d-flex justify-content-between align-items-end mb-4">
    <div>
      <h2 class="fw-bold text-dark mb-1">Categorías</h2>
      <p class="text-muted mb-0">Gestión de clasificaciones.</p>
    </div>

    <div class="d-flex gap-2">
      <button class="btn btn-outline-secondary rounded-pill px-3" (click)="toggleVerEliminados()">
        <i class="bi" [ngClass]="showingDeleted ? 'bi-arrow-left' : 'bi-recycle'"></i>
        {{ showingDeleted ? 'Volver' : 'Papelera' }}
      </button>

      <button *ngIf="!showingDeleted" class="btn btn-dark rounded-pill px-4" routerLink="/categorias/nuevo">
        <i class="bi bi-plus-lg me-2"></i> Nueva
      </button>
    </div>
  </div>

  <div class="card clean-card border-0">
    <div class="card-body p-0">
      <table class="table clean-table mb-0">
        <thead>
          <tr>
            <th class="ps-4">ID</th>
            <th>NOMBRE</th>
            <th>DESCRIPCIÓN</th>
            <th class="text-end pe-4">ACCIONES</th>
          </tr>
        </thead>
        <tbody>
          @for (cat of categorias; track cat.id) {
          <tr>
            <td class="ps-4 text-muted">#{{ cat.id }}</td>

            <td>
              <div class="fw-bold text-dark">{{ cat.nombre }}</div>
            </td>

            <td class="text-muted small">{{ cat.descripcion || '—' }}</td>

            <td class="text-end pe-4">
              <div class="d-flex justify-content-end gap-2">

                <ng-container *ngIf="!showingDeleted">
                    <button class="btn-icon btn-edit" [routerLink]="['/categorias/editar', cat.id]">
                      <i class="bi bi-pencil-fill"></i>
                    </button>
                    <button class="btn-icon btn-delete" (click)="eliminar(cat.id)">
                      <i class="bi bi-trash-fill"></i>
                    </button>
                </ng-container>

                <ng-container *ngIf="showingDeleted">
                    <button class="btn-icon btn-restore text-success" (click)="restaurar(cat.id)" style="background-color: rgba(25,135,84,0.1)">
                        <i class="bi bi-arrow-counterclockwise"></i>
                    </button>
                </ng-container>

              </div>
            </td>
          </tr>
          } @empty {
          <tr>
            <td colspan="4" class="text-center py-5">
              <div class="empty-state">
                <i class="bi bi-tags"></i>
                <h6 class="mt-3 text-muted">
                    {{ showingDeleted ? 'Papelera vacía' : 'No hay categorías' }}
                </h6>
              </div>
            </td>
          </tr>
          }
        </tbody>
      </table>
    </div>
  </div>
</div>
